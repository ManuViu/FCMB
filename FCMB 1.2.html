<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>FCMB</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Orbitron', sans-serif;
    background: #0a0a0f;
    color: #fff;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* Marca esquina */
.brand {
    position: fixed;
    top: 15px;
    right: 20px;
    font-size: 0.9rem;
    color: #00e5ff;
    letter-spacing: 2px;
    opacity: 0.7;
}

/* Header tipo plataforma */
header {
    width: 100%;
    padding: 20px 40px;
    font-size: 1.8rem;
    font-weight: bold;
    letter-spacing: 3px;
    background: linear-gradient(90deg, #111, #1a1a2e);
    border-bottom: 1px solid #222;
}

/* Contenedor */
.container {
    display: flex;
    flex: 1;
    padding: 20px;
    gap: 20px;
}

/* Player principal */
.video {
    flex: 1;
    border-radius: 12px;
    overflow: hidden;
    background: #000;
    box-shadow: 0 0 40px rgba(0, 229, 255, 0.15);
    transition: 0.3s;
}

.video:hover {
    box-shadow: 0 0 60px rgba(0, 229, 255, 0.35);
}

/* Chat */
.chat {
    width: 350px;
    border-radius: 12px;
    overflow: hidden;
    background: #0f0f1a;
    box-shadow: 0 0 30px rgba(255,255,255,0.05);
    transition: 0.3s;
}

.chat:hover {
    box-shadow: 0 0 50px rgba(255,255,255,0.1);
}

/* Iframes */
iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* Footer */
footer {
    text-align: center;
    padding: 15px;
    font-size: 0.8rem;
    color: #666;
}

/* Responsive */
@media (max-width: 1000px) {
    .container {
        flex-direction: column;
    }

    .chat {
        width: 100%;
        height: 400px;
    }
}
</style>

</head>

<body>

<div class="brand">TWFOLLOW</div>

<header>FCMB</header>

<div class="container">

    <div class="video">
        <iframe
            src="https://player.twitch.tv/?channel=futbolliveonlinee&parent=manuviu.github.io"
            allowfullscreen>
        </iframe>
    </div>

    <div class="chat">
        <iframe
            src="https://www.twitch.tv/embed/futbolliveonlinee/chat?parent=manuviu.github.io">
        </iframe>
    </div>

</div>

<footer>© FCMB</footer>

</body>
</html>
