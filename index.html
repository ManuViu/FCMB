<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Stream Futbol Live</title>
    <style>
        /* Reset y básicos */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Orbitron', sans-serif;
            background: radial-gradient(circle at top, #0a0a0a, #0d0d0d 70%);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Header futurista */
        header {
            width: 100%;
            padding: 20px 0;
            text-align: center;
            font-size: 2.2rem;
            font-weight: bold;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #6441a5, #8e44ad);
            color: #fff;
            text-shadow: 0 0 10px #8e44ad;
        }

        /* Contenedor principal */
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            padding: 20px;
            width: 90%;
            max-width: 1400px;
        }

        .video {
            flex: 1;
            min-width: 650px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 30px #6441a5;
            transition: transform 0.3s;
        }

        .video:hover { transform: scale(1.02); }

        .chat {
            flex: 0 0 370px;
            min-width: 300px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 20px #8e44ad;
            transition: transform 0.3s;
        }

        .chat:hover { transform: scale(1.02); }

        iframe { border: none; }

        /* Footer futurista */
        footer {
            margin-top: auto;
            padding: 20px;
            font-size: 0.9rem;
            color: #aaa;
            letter-spacing: 1px;
            text-align: center;
        }

        /* Responsive */
        @media (max-width: 1100px) {
            .container { flex-direction: column; align-items: center; }
            .chat { margin-left: 0; margin-top: 20px; }
        }
    </style>
    <!-- Fuente futurista -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

<header>Stream Futbol Live</header>

<div class="container">
    <div class="video">
        <iframe
            src="https://player.twitch.tv/?channel=futbolliveonlinee&parent=manuviu.github.io"
            height="500"
            width="900"
            allowfullscreen>
        </iframe>
    </div>

    <div class="chat">
        <iframe
            src="https://www.twitch.tv/embed/futbolliveonlinee/chat?parent=manuviu.github.io"
            height="500"
            width="350">
        </iframe>
    </div>
</div>

<footer>Creado por ManuSD22 ❤️</footer>

</body>
</html>
