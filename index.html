<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>FCMB</title>
    <style>
        /* Reset y básicos */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Orbitron', sans-serif;
            background: radial-gradient(circle at top, #0a0a0a, #0d0d0d 70%);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header futurista con efecto neón */
        header {
            width: 100%;
            padding: 25px 0;
            text-align: center;
            font-size: 2.5rem;
            font-weight: bold;
            letter-spacing: 3px;
            background: linear-gradient(90deg, #ff0040, #ff8c00, #ffd500, #00ff90);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientMove 10s ease infinite;
            text-shadow: 0 0 15px #ff0040, 0 0 30px #ff8c00;
        }

        @keyframes gradientMove {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        /* Contenedor principal */
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            padding: 30px;
            width: 90%;
            max-width: 1500px;
            position: relative;
        }

        /* Player de Twitch */
        .video {
            flex: 1;
            min-width: 650px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 50px #ff0040;
            transition: transform 0.4s, box-shadow 0.4s;
            position: relative;
        }

        .video:hover {
            transform: scale(1.03);
            box-shadow: 0 0 70px #ff8c00;
        }

        /* Chat lateral */
        .chat {
            flex: 0 0 380px;
            min-width: 300px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 40px #00ff90;
            transition: transform 0.4s, box-shadow 0.4s;
        }

        .chat:hover {
            transform: scale(1.03);
            box-shadow: 0 0 60px #00ff90;
        }

        iframe { border: none; }

        /* Footer futurista */
        footer {
            margin-top: auto;
            padding: 20px;
            font-size: 1rem;
            color: #aaa;
            letter-spacing: 1px;
            text-align: center;
        }

        /* Animaciones de balones flotantes */
        .ball {
            position: absolute;
            width: 40px;
            height: 40px;
            background: url('https://upload.wikimedia.org/wikipedia/commons/d/d3/Soccerball.svg') no-repeat center;
            background-size: contain;
            animation: float 10s linear infinite;
            opacity: 0.6;
        }

        @keyframes float {
            0% {transform: translateY(100vh) rotate(0deg);}
            50% {transform: translateY(50vh) rotate(180deg);}
            100% {transform: translateY(-10vh) rotate(360deg);}
        }

        /* Responsive */
        @media (max-width: 1100px) {
            .container { flex-direction: column; align-items: center; }
            .chat { margin-left: 0; margin-top: 25px; }
        }
    </style>
    <!-- Fuente futurista -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

<header>FCMB</header>

<div class="container">
    <div class="video">
        <iframe
            src="https://player.twitch.tv/?channel=futbolliveonlinee&parent=manuviu.github.io"
            height="500"
            width="900"
            allowfullscreen>
        </iframe>
    </div>

    <div class="chat">
        <iframe
            src="https://www.twitch.tv/embed/futbolliveonlinee/chat?parent=manuviu.github.io"
            height="500"
            width="350">
        </iframe>
    </div>
</div>

<!-- Balones flotantes -->
<div class="ball" style="left: 10%; animation-duration: 12s;"></div>
<div class="ball" style="left: 30%; animation-duration: 15s;"></div>
<div class="ball" style="left: 60%; animation-duration: 10s;"></div>
<div class="ball" style="left: 80%; animation-duration: 18s;"></div>

<footer>Creado por ManuSD22 ❤️</footer>

</body>
</html>
