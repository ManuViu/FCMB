<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Web en Desarrollo</title>
    <style>
        /* Reset básico */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* Fuente futurista */
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap');

        body {
            font-family: 'Orbitron', sans-serif;
            background: radial-gradient(circle at center, #0d0d0d, #1a1a1a);
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Animación de partículas o neón */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(100,65,165,0.2), transparent 50%);
            animation: moveBg 20s linear infinite;
            z-index: 0;
        }

        @keyframes moveBg {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        main {
            z-index: 1;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            color: #8e44ad;
            text-shadow: 0 0 20px #6441a5, 0 0 40px #8e44ad;
            margin-bottom: 20px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        p {
            font-size: 1.5rem;
            color: #ccc;
            text-shadow: 0 0 10px #6441a5;
        }

        @keyframes glow {
            0% { text-shadow: 0 0 10px #6441a5, 0 0 20px #8e44ad; }
            100% { text-shadow: 0 0 30px #8e44ad, 0 0 60px #6441a5; }
        }

        footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.9rem;
            color: #aaa;
            letter-spacing: 1px;
            text-align: center;
            z-index: 1;
        }

        /* Responsivo */
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            p { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<main>
    <h1>🚧 Web en Desarrollo 🚧</h1>
    <p>Pronto tendrás novedades increíbles. ¡Estate atento!</p>
</main>

<footer>Creado por ManuSD22 ❤️</footer>

</body>
</html>
