<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LIVE FUTBOL</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #111;
            color: #fff;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        h1 {
            padding: 20px;
            background-color: #6441a5;
            margin: 0;
        }
        .container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            padding: 20px;
        }
        .video {
            flex: 1;
            min-width: 600px;
        }
        .chat {
            flex: 0 0 350px;
            min-width: 300px;
            margin-left: 20px;
        }
        iframe {
            border: none;
        }
    </style>
</head>
<body>

<h1>LIVE FUTBOL</h1>

<div class="container">
    <!-- Stream de Twitch -->
    <div class="video">
        <iframe
            src="https://player.twitch.tv/?channel=futbolliveonlinee&parent=manuviu.github.io/StreamFutbol/"
            height="500"
            width="900"
            allowfullscreen>
        </iframe>
    </div>

    <!-- Chat de Twitch -->
    <div class="chat">
        <iframe
            src="https://www.twitch.tv/embed/futbolliveonlinee/chat?parent=manuviu.github.io/StreamFutbol/"
            height="500"
            width="350">
        </iframe>
    </div>
</div>

</body>

</html>
